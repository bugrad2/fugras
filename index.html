<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1020" />
    <title>Mesaj</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="scene" aria-label="Görsel mesaj sayfası">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>
      <div class="ambient ambient-c"></div>

      <section class="card">
        <p class="eyebrow">bunu bir daha düşün</p>
        <p class="side-note">lolün amk bize gelmez gardaş</p>
        <div class="quote-shell">
          <div class="quote-mark quote-mark-open">“</div>
          <h1 class="message">çok komikmiş furkan kardeşim bir daha olmasın</h1>
          <div class="quote-mark quote-mark-close">”</div>
        </div>
        <p class="caption">aynı cümle, daha sert bir sahne</p>
      </section>
    </main>
  </body>
</html>
